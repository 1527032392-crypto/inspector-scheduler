        .btn-success { background: var(--success); color: #fff; }

        tr:hover { background: #fafbfc; }

        .badge-green { background: #f6ffed; color: #389e0d; }
        .badge-orange { background: #fff7e6; color: #d48806; }
        .badge-red { background: #fff2f0; color: #cf1322; }
        .badge-blue { background: #e6f4ff; color: #1677ff; }

        .region-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; }
        .region-card-header { padding: 12px 20px; background: #fafafa; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }

        .region-card-header .meta { font-size: 12px; color: var(--text2); display: flex; gap: 12px; }
        .region-card-body { padding: 0; }

        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 2000; transform: translateX(120%); transition: transform 0.3s; }

const DAY_NAMES = ['周日','周一','周二','周三','周四'];
const DAY_DATES = ['5/18','5/19','5/20','5/21','5/22'];

let allRegionData = {}; // { regionName: { data: [...], updatedAt, issueNumber } }
let currentTab = 'all';
let allRegionNames = [];

// ==================== INIT ====================
function init() {
    allRegionNames = Object.keys(STORE_DATA).sort();
    updateTime();
    setInterval(updateTime, 60000);
    refreshData();
}

function updateTime() {
    document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
}

// ==================== DATA LOADING ====================
async function refreshData() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    document.getElementById('loadingOverlay').style.display = 'flex';

    try {
        let page = 1;
        let allIssues = [];

        while (true) {
            const resp = await fetch(`${GITHUB_API}?labels=${ISSUE_LABEL}&state=open&per_page=100&page=${page}`, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (!resp.ok) throw new Error(`GitHub API error: ${resp.status}`);
            const issues = await resp.json();
            if (issues.length === 0) break;
            allIssues = allIssues.concat(issues);
            page++;
        }

        allRegionData = {};
        allIssues.forEach(issue => {
            try {
                const payload = JSON.parse(issue.body);
                if (payload.region && payload.data) {
                    allRegionData[payload.region] = {
                        data: payload.data,
                        updatedAt: payload.updatedAt || issue.updated_at,
                        issueNumber: issue.number
                    };
                }
            } catch (e) { /* skip invalid */ }
        });

        renderAll();
        showToast(`已加载 ${Object.keys(allRegionData).length} 个大区的数据`, 'success');
    } catch (err) {
        console.error('Load error:', err);
        showToast('加载数据失败：' + err.message, 'error');
    } finally {
        btn.disabled = false;
        document.getElementById('loadingOverlay').style.display = 'none';
    }
}

// ==================== RENDER ====================
function renderAll() {
    updateStats();
    renderViewAll();
    renderViewRanking();
    renderViewLowest();
}

function updateStats() {
    const submitted = Object.keys(allRegionData).length;
    const pending = allRegionNames.length - submitted;
    const totalSpotCheck = Object.values(allRegionData).reduce((sum, r) => {
        return sum + r.data.filter(x => x.spotCheck).length;
    }, 0);

    // Calculate avg score from spotted managers who have scores
    const allScores = [];
    Object.values(allRegionData).forEach(r => {
        r.data.forEach(x => {
            if (x.spotCheck && x.score) allScores.push(Number(x.score));
        });
    });
    const avgScore = allScores.length > 0 ? (allScores.reduce((a,b) => a+b, 0) / allScores.length).toFixed(1) : '--';

    // Find lowest
    let lowest = { name: '--', score: '--', region: '--' };
    Object.entries(allRegionData).forEach(([region, r]) => {
        r.data.forEach(x => {
            if (x.spotCheck && x.score !== '' && x.score !== undefined) {
                const s = Number(x.score);
                if (lowest.score === '--' || s < lowest.score) {
                    lowest = { name: x.name, score: s, region: region };
                }
            }
        });
    });

    document.getElementById('statSubmitted').textContent = submitted;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statSpotCheck').textContent = totalSpotCheck;
    document.getElementById('statAvgScore').textContent = avgScore;
    document.getElementById('statLowest').textContent = lowest.score !== '--' ? `${lowest.score}` : '--';
    document.getElementById('statLowest').title = lowest.score !== '--' ? `${lowest.region} - ${lowest.name}` : '';
}

function renderViewAll() {
    const container = document.getElementById('viewAll');

    if (allRegionNames.length === 0) {
        container.innerHTML = '<div class="no-data"><div class="icon">📭</div>暂无数据</div>';
        return;
    }

    let html = '';

    allRegionNames.forEach(region => {
        const rd = allRegionData[region];
        const isSubmitted = !!rd;
        const xqList = STORE_DATA[region];

        html += `<div class="region-card">`;
        html += `<div class="region-card-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">`;
        html += `<span class="name">${isSubmitted ? '✅' : '⏳'} ${region}</span>`;
        html += `<span class="meta">`;
        if (isSubmitted) {
            const spotCount = rd.data.filter(x => x.spotCheck).length;
            html += `<span>抽查 ${spotCount} 人</span>`;
            html += `<span>更新于 ${new Date(rd.updatedAt).toLocaleString('zh-CN')}</span>`;
        } else {
            html += `<span style="color:#999;">未提交</span>`;
        }
        html += `</span></div>`;

        html += `<div class="region-card-body ${isSubmitted ? '' : 'collapsed'}">`;
        if (isSubmitted) {
            html += `<table><thead><tr>`;
            html += `<th>小区经理</th><th>城市</th><th>门店数</th>`;
            DAY_DATES.forEach((d, i) => { html += `<th>${DAY_NAMES[i]}<br><span style="font-weight:400;font-size:11px;color:#999">${d}</span></th>`; });
            html += `<th>是否抽查</th><th>现场评定分数</th><th>状态</th>`;
            html += `</tr></thead><tbody>`;

            rd.data.forEach(x => {
                const isLow = x.score !== '' && x.score !== undefined && Number(x.score) < 60;
                html += `<tr class="${isLow ? 'score-low' : ''}">`;
                html += `<td style="font-weight:600;">${x.name}</td>`;
                html += `<td>${x.city || ''}</td>`;
                html += `<td>${x.shopCount || ''}</td>`;

                for (let d = 1; d <= 5; d++) {
                    const isActive = x.days && x.days.includes(d);
                    html += `<td style="text-align:center;">${isActive ? '✅' : ''}</td>`;
                }

                html += `<td style="text-align:center;">${x.spotCheck ? '<span class="badge badge-orange">抽查</span>' : '<span class="badge badge-green">免检</span>'}</td>`;
                html += `<td style="text-align:center; font-weight:700; color:${x.score ? (Number(x.score) < 60 ? 'var(--danger)' : 'var(--text)') : '#999'};">${x.score || '--'}</td>`;
                html += `<td>${x.spotCheck ? '抽查' : '免检'}</td>`;
                html += `</tr>`;
            });

            html += `</tbody></table>`;
        }
        html += `</div></div>`;
    });

    container.innerHTML = html;
}

function renderViewRanking() {
    const container = document.getElementById('viewRanking');

    // Collect all spotted managers with scores
    const allSpotted = [];
    Object.entries(allRegionData).forEach(([region, rd]) => {
        rd.data.forEach(x => {
            if (x.spotCheck) {
                allSpotted.push({
                    region,
                    name: x.name,
                    city: x.city || '',
                    score: x.score !== '' && x.score !== undefined ? Number(x.score) : null,
                    days: x.days || []
                });
            }
        });
    });

    // Sort by score ascending (lowest first)
    allSpotted.sort((a, b) => {
        if (a.score === null && b.score === null) return 0;
        if (a.score === null) return 1;
        if (b.score === null) return -1;
        return a.score - b.score;
    });

    if (allSpotted.length === 0) {
        container.innerHTML = '<div class="no-data"><div class="icon">📭</div>暂无抽查数据</div>';
        return;
    }

    let html = `<div class="card"><div class="card-header"><span>🏆 全部抽查小区经理 - 分数排名（低→高）</span><span style="font-size:12px;color:#999;">共 ${allSpotted.length} 人</span></div>`;
    html += `<div class="card-body" style="overflow-x:auto;"><table>`;
    html += `<thead><tr><th>排名</th><th>大区经理</th><th>小区经理</th><th>城市</th><th>现场评定分数</th><th>培训日期</th><th>状态</th></tr></thead><tbody>`;

    allSpotted.forEach((x, i) => {
        const isLow = x.score !== null && x.score < 60;
        html += `<tr class="${isLow ? 'score-low' : ''}">`;
        html += `<td style="font-weight:600; ${i < 3 ? 'color:var(--danger);' : ''}">${i + 1}</td>`;
        html += `<td>${x.region}</td>`;
        html += `<td style="font-weight:600;">${x.name}</td>`;
        html += `<td>${x.city}</td>`;
        html += `<td style="text-align:center; font-weight:700; font-size:16px; color:${x.score !== null ? (x.score < 60 ? 'var(--danger)' : x.score < 80 ? 'var(--warning)' : 'var(--success)') : '#999'};">${x.score !== null ? x.score : '--'}</td>`;
        html += `<td>${x.days.map(d => DAY_NAMES[d-1]).join('、')}</td>`;
        html += `<td>${isLow ? '<span class="badge badge-red">需关注</span>' : '<span class="badge badge-green">正常</span>'}</td>`;
        html += `</tr>`;
    });

    html += `</tbody></table></div></div>`;
    container.innerHTML = html;
}

function renderViewLowest() {
    const container = document.getElementById('viewLowest');

    // Find lowest score manager per region
    const lowestPerRegion = [];
    Object.entries(allRegionData).forEach(([region, rd]) => {
        const spotted = rd.data.filter(x => x.spotCheck && x.score !== '' && x.score !== undefined);
        if (spotted.length === 0) return;

        let lowest = spotted[0];
        spotted.forEach(x => {
            if (Number(x.score) < Number(lowest.score)) lowest = x;
        });

        lowestPerRegion.push({
            region,
            name: lowest.name,
            city: lowest.city || '',
            score: Number(lowest.score),
            days: lowest.days || [],
            totalSpotted: rd.data.filter(x => x.spotCheck).length
        });
    });

    // Sort by score
    lowestPerRegion.sort((a, b) => a.score - b.score);

    // Also find regions that haven't submitted
    const notSubmitted = allRegionNames.filter(n => !allRegionData[n]);

    let html = '';

    if (lowestPerRegion.length > 0) {
        html += `<div class="card"><div class="card-header"><span>🔽 各大区最低分小区经理</span><span style="font-size:12px;color:#999;">共 ${lowestPerRegion.length} 个已提交大区</span></div>`;
        html += `<div class="card-body" style="overflow-x:auto;"><table>`;
        html += `<thead><tr><th>大区经理</th><th>最低分小区经理</th><th>城市</th><th>分数</th><th>培训日期</th><th>抽查人数</th><th>建议</th></tr></thead><tbody>`;

        lowestPerRegion.forEach(x => {
            const needFocus = x.score < 60;
            html += `<tr class="${needFocus ? 'score-low' : ''}">`;
            html += `<td style="font-weight:600;">${x.region}</td>`;
            html += `<td>${x.name}</td>`;
            html += `<td>${x.city}</td>`;
            html += `<td style="text-align:center; font-weight:700; font-size:18px; color:${x.score < 60 ? 'var(--danger)' : x.score < 80 ? 'var(--warning)' : 'var(--success)'};">${x.score}</td>`;
            html += `<td>${x.days.map(d => DAY_NAMES[d-1]).join('、')}</td>`;
            html += `<td style="text-align:center;">${x.totalSpotted}</td>`;
            html += `<td>${needFocus ? '<span class="badge badge-red">重点抽查</span>' : x.score < 80 ? '<span class="badge badge-orange">关注</span>' : '<span class="badge badge-green">正常</span>'}</td>`;
            html += `</tr>`;
        });

        html += `</tbody></table></div></div>`;
    }

    if (notSubmitted.length > 0) {
        html += `<div class="info-banner" style="margin-top:16px;">⏳ 未提交数据的大区经理（${notSubmitted.length} 人）：${notSubmitted.join('、')}</div>`;
    }

    if (!html) {
        html = '<div class="no-data"><div class="icon">📭</div>暂无数据</div>';
    }

    container.innerHTML = html;
}

// ==================== TABS ====================
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    if (tab === 'all') {
        document.getElementById('tabAll').classList.add('active');
        document.getElementById('viewAll').style.display = 'block';
        document.getElementById('viewRanking').style.display = 'none';
        document.getElementById('viewLowest').style.display = 'none';
    } else if (tab === 'ranking') {
        document.getElementById('tabRanking').classList.add('active');
        document.getElementById('viewAll').style.display = 'none';
        document.getElementById('viewRanking').style.display = 'block';
        document.getElementById('viewLowest').style.display = 'none';
    } else if (tab === 'lowest') {
        document.getElementById('tabLowest').classList.add('active');
        document.getElementById('viewAll').style.display = 'none';
        document.getElementById('viewRanking').style.display = 'none';
        document.getElementById('viewLowest').style.display = 'block';
    }
}

function exportAll() {
    const wb = XLSX.utils.book_new();

    // Summary sheet
    const summaryHeaders = ['大区经理', '状态', '抽查人数', '最低分', '最低分小区经理', '更新时间'];

    allRegionNames.forEach(region => {
        const rd = allRegionData[region];
        if (rd) {
            const spotted = rd.data.filter(x => x.spotCheck);
            const scored = spotted.filter(x => x.score !== '' && x.score !== undefined);
            let lowest = { name: '--', score: '--' };
            scored.forEach(x => {
                if (lowest.score === '--' || Number(x.score) < lowest.score) {
                    lowest = { name: x.name, score: Number(x.score) };
                }
            });
            summaryRows.push([
                region, '已提交', spotted.length,
                lowest.score, lowest.name,
                new Date(rd.updatedAt).toLocaleString('zh-CN')
            ]);
        } else {
            summaryRows.push([region, '未提交', '', '', '', '']);
        }
    });

    const ws1 = XLSX.utils.aoa_to_sheet(summaryRows);
    ws1['!cols'] = [{wch:12},{wch:8},{wch:10},{wch:8},{wch:12},{wch:20}];
    XLSX.utils.book_append_sheet(wb, ws1, '大区汇总');

    // Detail sheet - all spotted managers
    const detailHeaders = ['大区经理', '小区经理', '城市', '门店数', '是否抽查', '现场评定分数', '培训日期', '状态'];
    const detailRows = [detailHeaders];

    Object.entries(allRegionData).forEach(([region, rd]) => {
        rd.data.forEach(x => {
            detailRows.push([
                region, x.name, x.city || '', x.shopCount || '',
                x.spotCheck ? '✓ 抽查' : '',
                x.score || '',
                x.days ? x.days.map(d => DAY_NAMES[d-1]).join('、') : '',
                x.spotCheck ? '抽查' : '免检'
            ]);
        });
    });

    const ws2 = XLSX.utils.aoa_to_sheet(detailRows);
    ws2['!cols'] = [{wch:12},{wch:12},{wch:10},{wch:8},{wch:10},{wch:14},{wch:14},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws2, '小区经理明细');

    XLSX.writeFile(wb, `总部汇总_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.xlsx`);
    showToast('汇总导出成功！', 'success');
}

function exportLowestScores() {
    const wb = XLSX.utils.book_new();
    const headers = ['大区经理', '最低分小区经理', '城市', '分数', '培训日期', '抽查人数', '建议'];
    const rows = [headers];

    Object.entries(allRegionData).forEach(([region, rd]) => {
        const spotted = rd.data.filter(x => x.spotCheck && x.score !== '' && x.score !== undefined);
        if (spotted.length === 0) {
            rows.push([region, '', '', '', '', '', '无评分数据']);
            return;
        }
        let lowest = spotted[0];
        spotted.forEach(x => { if (Number(x.score) < Number(lowest.score)) lowest = x; });
        const score = Number(lowest.score);
        rows.push([
            region, lowest.name, lowest.city || '', score,
            lowest.days.map(d => DAY_NAMES[d-1]).join('、'),
            rd.data.filter(x => x.spotCheck).length,
            score < 60 ? '重点抽查' : score < 80 ? '关注' : '正常'
        ]);
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:12},{wch:12},{wch:10},{wch:8},{wch:14},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws, '各区最低分');
    XLSX.writeFile(wb, `各区最低分_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.xlsx`);
    showToast('导出成功！', 'success');
}

// ==================== UTILS ====================
function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => { toast.className = 'toast'; }, 3000);
}

// ==================== START ====================
init();
</script>
