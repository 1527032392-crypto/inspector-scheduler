<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大区培训检查排期系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #1677ff;
            --success: #52c41a;
            --warning: #faad14;
            --danger: #ff4d4f;
            --text: #1f1f1f;
            --text-secondary: #666;
            --border: #e8e8e8;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .header .subtitle {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 24px;
            box-shadow: var(--shadow);
            flex: 1;
            min-width: 150px;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-card .value.blue { color: var(--primary); }
        .stat-card .value.green { color: var(--success); }
        .stat-card .value.orange { color: var(--warning); }
        .stat-card .value.red { color: var(--danger); }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: #4096ff; }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover { background: #73d13d; }

        .btn-outline {
            background: white;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover { background: #ff7875; }

        .info-banner {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #8c6900;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-banner.warn {
            background: #fff2f0;
            border-color: #ffccc7;
            color: #a8071a;
        }

        .info-banner.ok {
            background: #f6ffed;
            border-color: #b7eb8f;
            color: #389e0d;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-body { padding: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #fafafa;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        tr:hover { background: #fafbfc; }

        tr.exempt {
            background: #f6ffed !important;
            opacity: 0.75;
        }

        tr.exempt td.name-cell {
            text-decoration: line-through;
            color: #999;
        }

        .check-cell {
            text-align: center;
            width: 50px;
        }

        .check-cell input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .schedule-cell {
            text-align: center;
            font-weight: 600;
            width: 55px;
        }

        .schedule-cell.active {
            background: #e6f4ff;
            color: var(--primary);
            border-radius: 4px;
            padding: 4px 0;
        }

        .schedule-cell:not(.active) {
            color: transparent;
        }

        .schedule-cell:hover:not(.active) {
            color: #ccc;
            background: #fafafa;
            border-radius: 4px;
        }

        .city-tag {
            display: inline-block;
            background: #f0f5ff;
            color: #2f54eb;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .inspector-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }

        .inspector-tag.assigned {
            background: #e6f4ff;
            color: var(--primary);
        }

        .inspector-tag.unassigned {
            background: #fff1f0;
            color: var(--danger);
        }

        .inspector-tag.fixed-exempt {
            background: #f6ffed;
            color: var(--success);
        }

        .inspector-tag.manual {
            cursor: pointer;
            position: relative;
        }

        .inspector-tag.manual:hover {
            opacity: 0.85;
            filter: brightness(0.95);
        }

        .inspector-tag.manual::after {
            content: '手动';
            position: absolute;
            top: -6px;
            right: -4px;
            background: #faad14;
            color: #fff;
            font-size: 9px;
            padding: 0 3px;
            border-radius: 3px;
            line-height: 14px;
        }

        .inspector-tag.selectable {
            cursor: pointer;
            border: 1px dashed var(--border);
            background: #fafafa;
        }

        .inspector-tag.selectable:hover {
            border-color: var(--primary);
            background: #e6f4ff;
            color: var(--primary);
        }

        .inspector-dropdown {
            position: absolute;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.08), 0 0 1px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 180px;
            max-height: 320px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .inspector-dropdown .dropdown-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }

        .inspector-dropdown .dropdown-item:hover {
            background: #e6f4ff;
        }

        .inspector-dropdown .dropdown-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .inspector-dropdown .dropdown-item .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .inspector-dropdown .dropdown-item .info {
            flex: 1;
        }

        .inspector-dropdown .dropdown-item .capacity {
            font-size: 11px;
            color: #999;
        }

        .inspector-dropdown .dropdown-item .capacity.full {
            color: var(--danger);
        }

        .inspector-dropdown .dropdown-clear {
            display: block;
            width: 100%;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: var(--danger);
            cursor: pointer;
            border-top: 1px solid #f0f0f0;
            transition: background 0.15s;
        }

        .inspector-dropdown .dropdown-clear:hover {
            background: #fff1f0;
        }

        .exempt-select {
            padding: 2px 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Inspector Panel */
        .inspector-list {
            padding: 16px;
        }

        .inspector-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .inspector-item:hover {
            background: #fafbfc;
            border-color: var(--border);
        }

        .inspector-item.busy {
            opacity: 0.5;
        }

        .inspector-item.overloaded {
            border-color: var(--danger);
            background: #fff2f0;
        }

        .inspector-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }

        .inspector-info { flex: 1; }

        .inspector-name {
            font-weight: 600;
            font-size: 14px;
        }

        .inspector-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .inspector-capacity {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .capacity-ok {
            background: #f6ffed;
            color: var(--success);
        }

        .capacity-full {
            background: #fff2f0;
            color: var(--danger);
        }

        .capacity-free {
            background: #e6f4ff;
            color: var(--primary);
        }

        /* Assignment detail */
        .assignment-detail {
            padding: 16px;
        }

        .assignment-block {
            background: #fafafa;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary);
        }

        .assignment-block.free-exempt {
            border-left-color: var(--success);
            background: #f6ffed;
        }

        .assignment-block .a-title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .assignment-block .a-detail {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* No assignment */
        .no-assignment {
            text-align: center;
            padding: 40px 20px;
            color: #ccc;
        }

        .no-assignment .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* Log panel */
        .log-panel {
            margin-top: 20px;
        }

        .log-content {
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: "SF Mono", Menlo, monospace;
            font-size: 12px;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .log-entry .time {
            color: #999;
            margin-right: 8px;
        }

        .log-entry.success { color: var(--success); }
        .log-entry.warn { color: var(--warning); }
        .log-entry.error { color: var(--danger); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 12px;
            width: 500px;
            max-width: 90vw;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body { padding: 24px; }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            text-align: right;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            padding: 4px;
        }

        .close-btn:hover { color: var(--text); }

        /* Legend */
        .legend {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 8px 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 2000;
            transform: translateX(120%);
            transition: transform 0.3s;
        }

        .toast.show { transform: translateX(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }

        .badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
        }
        .badge-red { background: #fff1f0; color: #cf1322; }
        .badge-green { background: #f6ffed; color: #389e0d; }
        .badge-blue { background: #e6f4ff; color: #1677ff; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>📋 大区培训检查排期系统</h1>
        <div class="subtitle">检查员自动分配 · 免检动态管理 · 一键导出</div>
    </div>
    <div style="font-size:12px; opacity:0.6;" id="currentTime"></div>
</div>

<div class="container">
    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="label">大区经理总数</div>
            <div class="value blue" id="statTotal">22</div>
        </div>
        <div class="stat-card">
            <div class="label">需要检查</div>
            <div class="value orange" id="statNeedCheck">22</div>
        </div>
        <div class="stat-card">
            <div class="label">已免检</div>
            <div class="value green" id="statExempt">2</div>
        </div>
        <div class="stat-card">
            <div class="label">免检剩余名额</div>
            <div class="value" id="statExemptRemain" style="color:#8c6900;">5</div>
        </div>
        <div class="stat-card">
            <div class="label">未分配检查员</div>
            <div class="value red" id="statUnassigned">22</div>
        </div>
    </div>

    <!-- Info Banner -->
    <div class="info-banner" id="infoBanner">
        ⚡ 点击表格中的「免检」列勾选/取消免检，然后点击「自动分配检查员」生成方案
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <button class="btn btn-success" onclick="autoAssign()">🔄 自动分配检查员</button>
        <button class="btn btn-primary" onclick="exportExcel()">📥 导出 Excel</button>
        <button class="btn btn-outline" onclick="resetAll()">🔃 重置所有</button>
        <button class="btn btn-outline" onclick="showDraftPlan()" style="border-color:#faad14;color:#faad14;">💡 拟定方案</button>
        <div style="flex:1;"></div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#e6f4ff;"></div> 培训日</div>
            <div class="legend-item"><div class="legend-dot" style="background:#f6ffed;"></div> 免检</div>
            <div class="legend-item"><div class="legend-dot" style="background:#fff2f0;"></div> 未分配</div>
        </div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">
        <!-- Schedule Table -->
        <div class="card">
            <div class="card-header">
                <span>📅 大区培训排期表</span>
                <span style="font-size:12px; font-weight:400; color:#999;" id="tableNote">（王瑶、付钟庆为内定免检）</span>
            </div>
            <div class="card-body" style="overflow-x:auto;">
                <table id="scheduleTable">
                    <thead>
                        <tr>
                            <th>组别</th>
                            <th>大区经理</th>
                            <th class="schedule-cell">周一<br><span style="font-weight:400;font-size:11px;color:#999">5/11</span></th>
                            <th class="schedule-cell">周二<br><span style="font-weight:400;font-size:11px;color:#999">5/12</span></th>
                            <th class="schedule-cell">周三<br><span style="font-weight:400;font-size:11px;color:#999">5/13</span></th>
                            <th class="schedule-cell">周四<br><span style="font-weight:400;font-size:11px;color:#999">5/14</span></th>
                            <th class="schedule-cell">周五<br><span style="font-weight:400;font-size:11px;color:#999">5/15</span></th>
                            <th>会议举办城市</th>
                            <th class="check-cell">免检</th>
                            <th>检查员</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Inspector Panel -->
        <div>
            <div class="card">
                <div class="card-header">
                    <span>👤 检查员状态</span>
                </div>
                <div class="inspector-list" id="inspectorList">
                </div>
            </div>

            <div class="card" style="margin-top:16px;">
                <div class="card-header">
                    <span>📝 分配详情</span>
                </div>
                <div id="assignmentDetail">
                    <div class="no-assignment">
                        <div class="icon">📋</div>
                        <div>点击「自动分配检查员」查看分配方案</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Log -->
    <div class="card log-panel">
        <div class="card-header">
            <span>📜 分配日志</span>
            <button class="btn btn-outline" style="padding:4px 12px; font-size:12px;" onclick="clearLog()">清空</button>
        </div>
        <div class="log-content" id="logContent">
            <div class="log-entry"><span class="time">--:--</span> 系统就绪，等待操作...</div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== DATA ====================

const INSPECTORS = [
    { id: 0, name: '周宁', maxRegions: 2, type: 'flexible', color: '#1677ff' }, // 灵活：可半天/1天，时间可冲突
    { id: 1, name: '王一扬', maxRegions: 2, type: 'full', color: '#722ed1' },
    { id: 2, name: '苑玉威', maxRegions: 2, type: 'full', color: '#13c2c2' },
    { id: 3, name: '王九洋', maxRegions: 2, type: 'full', color: '#eb2f96' },
    { id: 4, name: '夏月', maxRegions: 2, type: 'full', color: '#fa8c16' },
    { id: 5, name: '侯琦', maxRegions: 2, type: 'full', color: '#52c41a' },
    { id: 6, name: '方凯', maxRegions: 1, type: 'limited', color: '#2f54eb' },
    { id: 7, name: '王瑶', maxRegions: 1, type: 'limited', color: '#f5222d', selfTrainingDays: [1,2] },
    { id: 8, name: '付钟庆', maxRegions: 1, type: 'limited', color: '#fa541c', selfTrainingDays: [1,2] },
    { id: 9, name: '徐老师', maxRegions: 1, type: 'limited', color: '#a0d911' },
    { id: 10, name: '郭士龙', maxRegions: 2, type: 'full', color: '#1890ff' }
];

const FIXED_EXEMPT = ['王瑶', '付钟庆'];
const MAX_EXEMPT = 7;

const DEFAULT_DAYS = {};
const MANAGERS = [
    { group: '1组', name: '付钟庆', days: [1,2], city: '北京', responsibleCities: '北京' },
    { group: '1组', name: '王世爽', days: [3,4], city: '北京', responsibleCities: '北京' },
    { group: '2组', name: '肖敏', days: [2,3], city: '天津', responsibleCities: '天津、廊坊、沧州' },
    { group: '2组', name: '王瑶', days: [1,2], city: '济南', responsibleCities: '东营、德州、济南、淄博、滨州、聊城、莱芜' },
    { group: '3组', name: '张国良', days: [1,2], city: '大连', responsibleCities: '东港、丹东、大连、庄河、朝阳、盘锦、营口、葫芦岛、赤峰、锦州' },

function getTrainRecommendation(fromCity, toCity) {
    const key1 = `${fromCity}-${toCity}`;
    const key2 = `${toCity}-${fromCity}`;
    const trains = TRAIN_DATA[key1] || TRAIN_DATA[key2] || [];
    if (trains.length === 0) return null;
    const first = TRAIN_DATA[key1] ? trains[0] : null;
    return { trains, isReverse: !first };
}

function getTrainDayNames(manager1, manager2) {
    const allDays = new Set([...manager1.days, ...manager2.days]);
    const dayNames = {1:'周一',2:'周二',3:'周三',4:'周四',5:'周五'};
    const freeDays = [];
    for (let d = 1; d <= 5; d++) {
        if (!allDays.has(d)) freeDays.push(dayNames[d]);
    }
    return freeDays.join('、');
}

const CITY_COORDS = {
    '北京': [116.4,39.9], '天津': [117.2,39.1], '太原': [112.5,37.9], '济南': [117.0,36.7],
    '郑州': [113.6,34.7], '武汉': [114.3,30.6], '上海': [121.5,31.2], '南京': [118.8,32.1],
    '宁波': [121.6,29.9], '杭州': [120.2,30.3], '合肥': [117.3,31.8], '徐州': [117.2,34.3],
    '保定': [115.5,38.9], '青岛': [120.4,36.1], '济宁': [116.6,35.4], '大连': [121.6,38.9],
    '沈阳': [123.4,41.8], '长春': [125.3,43.9], '哈尔滨': [126.6,45.8], '西安': [108.9,34.3]
};

function getDistance(city1, city2) {
    const c1 = CITY_COORDS[city1], c2 = CITY_COORDS[city2];
    if (!c1 || !c2) return 9999;
    const R = 6371;
    const dLat = (c2[0]-c1[0])*Math.PI/180;
    const dLon = (c2[1]-c1[1])*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(c1[0]*Math.PI/180)*Math.cos(c2[0]*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function renderInspectors() {
    const list = document.getElementById('inspectorList');
    list.innerHTML = '';

    // Count assignments per inspector
    const counts = {};
    INSPECTORS.forEach(i => counts[i.id] = 0);
    state.assignments.forEach(a => { counts[a.inspectorId] = (counts[a.inspectorId]||0) + 1; });

    INSPECTORS.forEach(ins => {
        const count = counts[ins.id];
        const max = ins.maxRegions;
        const pct = count / max;

        let statusClass = 'capacity-free';
        let statusText = `0/${max} 可分配`;
        if (count >= max) {
            statusClass = 'capacity-full';
            statusText = `${count}/${max} 已满`;
        } else if (count > 0) {
            statusClass = 'capacity-ok';
            statusText = `${count}/${max} 已分配`;
        }

        const div = document.createElement('div');
        div.className = `inspector-item ${count >= max ? 'busy' : ''} ${count > max ? 'overloaded' : ''}`;
        div.innerHTML = `
            <div class="inspector-avatar" style="background:${ins.color};">${ins.name.charAt(0)}</div>
            <div class="inspector-info">
                <div class="inspector-name">${ins.name}</div>
                <div class="inspector-meta">${ins.type === 'limited' ? '🔍 可检查 1 个大区' : '🔍 可检查 2 个大区'}</div>
            </div>
            <span class="inspector-capacity ${statusClass}">${statusText}</span>
        `;
        list.appendChild(div);
    });
}

function updateStats() {
    const total = state.managers.length;
    const exempt = state.managers.filter(m => m.exempt).length;
    const needCheck = total - exempt;
    const assigned = state.assignments.length;
    const unassigned = needCheck - assigned;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statExempt').textContent = exempt;
    document.getElementById('statNeedCheck').textContent = needCheck;
    document.getElementById('statExemptRemain').textContent = MAX_EXEMPT - exempt;
    document.getElementById('statUnassigned').textContent = Math.max(0, unassigned);

    // Color the remain
    const remain = MAX_EXEMPT - exempt;
    const el = document.getElementById('statExemptRemain');
    if (remain <= 0) {
        el.style.color = 'var(--danger)';
    } else if (remain <= 2) {
        el.style.color = 'var(--warning)';
    } else {
        el.style.color = '#8c6900';
    }
}

function updateInfoBanner() {
    const banner = document.getElementById('infoBanner');
    const exempt = state.managers.filter(m => m.exempt).length;
    const remain = MAX_EXEMPT - exempt;
    const assigned = state.assignments.length;
    const needCheck = state.managers.filter(m => !m.exempt).length;

    if (assigned === needCheck && needCheck > 0) {
        banner.className = 'info-banner ok';
        banner.innerHTML = `✅ 所有 ${needCheck} 个待检大区已全部分配检查员`;
    } else if (assigned > 0) {
        banner.className = 'info-banner warn';
        banner.innerHTML = `⚠️ 已分配 ${assigned}/${needCheck}，还有 ${needCheck - assigned} 个大区未分配检查员`;
    } else if (remain <= 0) {
        banner.className = 'info-banner warn';
        banner.innerHTML = `⚠️ 免检名额已满（${exempt}/${MAX_EXEMPT}），无法继续添加`;

        banner.className = 'info-banner';
        banner.innerHTML = `⚡ 点击表格中的「免检」列勾选/取消免检，然后点击「自动分配检查员」生成方案（剩余免检名额：${remain}）`;
    }
}

function showInspectorDropdown(managerId, el) {
    event.stopPropagation();
    const m = state.managers[managerId];
    const managerDays = new Set(m.days);
    const td = el.closest('td');

    closeDropdown();

    const dropdown = document.createElement('div');
    dropdown.className = 'inspector-dropdown';

    INSPECTORS.forEach(ins => {
        const usage = getInspectorUsage(ins.id);
        const capacity = usage >= ins.maxRegions;
        const busyDays = getInspectorBusyDays(ins.id);
        const hasConflict = [...managerDays].some(d => busyDays.has(d));
        const hasSelfConflict = ins.selfTrainingDays && [...managerDays].some(d => ins.selfTrainingDays.includes(d));

        // Flexible inspectors (周宁) can conflict, but self-training always conflicts
        let disabled = capacity || (hasConflict && ins.type !== 'flexible') || hasSelfConflict;
        let reason = '';
        if (capacity) reason = `（已满 ${ins.maxRegions}/${ins.maxRegions}）`;
        else if (hasSelfConflict) reason = '（自己培训中）';
        else if (hasConflict && ins.type !== 'flexible') reason = '（时间冲突）';
        else if (hasConflict && ins.type === 'flexible') reason = '（灵活可排）';

        const item = document.createElement('div');
        item.className = `dropdown-item ${disabled ? 'disabled' : ''}`;
        item.innerHTML = `
            <span class="dot" style="background:${ins.color}"></span>
            <span class="info">${ins.name} <span style="font-size:11px;color:#bbb">${ins.type === 'flexible' ? '灵活' : ins.type === 'limited' ? '限1区' : '可2区'}</span></span>
            <span class="capacity ${capacity ? 'full' : ''}">${usage}/${ins.maxRegions}${reason}</span>
        `;
        if (!disabled) {
            item.onclick = (e) => {
                e.stopPropagation();
                assignInspector(managerId, ins.id, true);
                closeDropdown();
            };
        }
        dropdown.appendChild(item);
    });

    const clearBtn = document.createElement('div');
    clearBtn.className = 'dropdown-clear';
    clearBtn.textContent = '✕ 清除分配';
    clearBtn.onclick = (e) => {
        e.stopPropagation();
        clearInspectorAssignment(managerId);
        closeDropdown();
    };
    dropdown.appendChild(clearBtn);

    td.appendChild(dropdown);
    activeDropdown = dropdown;

    const rect = el.getBoundingClientRect();
    dropdown.style.position = 'fixed';
    dropdown.style.left = rect.left + 'px';
    dropdown.style.top = (rect.bottom + 4) + 'px';
}

    const m = state.managers[managerId];
    const ins = INSPECTORS[inspectorId];

    // Clear existing assignment to this manager
    state.assignments = state.assignments.filter(a => a.managerId !== managerId);
    m.assignedInspector = inspectorId;
    m.manualAssign = manual || false;

    state.assignments.push({ inspectorId, managerId });

    addLog(`手动分配：${ins.name} → ${m.name}（${m.city}）`, 'info');
    renderTable();
    renderInspectors();
    updateStats();
    updateInfoBanner();

function autoAssign() {
    addLog('开始自动分配检查员...（手动分配的不会被覆盖）', '');

    // Preserve manual assignments, clear auto ones
    const manualAssignments = state.assignments.filter(a => {
        const m = state.managers[a.managerId];
        return m.manualAssign;
    });

    // Build manual usage map to avoid conflicts
    const manualUsage = {};
    INSPECTORS.forEach(ins => {
        manualUsage[ins.id] = { count: 0, days: new Set(), cities: [] };
    });
    manualAssignments.forEach(a => {
        const m = state.managers[a.managerId];
        manualUsage[a.inspectorId].count++;
        m.days.forEach(d => manualUsage[a.inspectorId].days.add(d));
        manualUsage[a.inspectorId].cities.push(m.city);
    });

    // Clear auto assignments only
    state.managers.forEach(m => {
        if (!m.manualAssign) {
            m.assignedInspector = null;
        }
    });
    state.assignments = [...manualAssignments];

    // Get managers that need checking (exclude already manually assigned)
    const needCheck = state.managers.filter(m => !m.exempt && !m.manualAssign);
    addLog(`需要检查的大区：${needCheck.length} 个`, '');

    if (needCheck.length === 0) {
        showToast('所有大区均已免检，无需分配', 'warning');
        addLog('无需分配，结束', 'warn');
        updateInfoBanner();
        return;
    }

    // Track inspector usage: inherit from manual assignments
    const usage = {};
    INSPECTORS.forEach(ins => {
        usage[ins.id] = {
            count: manualUsage[ins.id].count,
            days: new Set(manualUsage[ins.id].days),
            cities: [...manualUsage[ins.id].cities]
        };
    });

    // Group by primary time slot (use earliest day to decide group)
    const assigned_set = new Set();
    const firstHalf = [];
    const secondHalf = [];
    const midWeek = []; // 周三为主的

    needCheck.forEach(m => {
        if (assigned_set.has(m.id)) return;
        // Determine primary slot by earliest day
        if (m.days.includes(1) || m.days.includes(2)) {
            firstHalf.push(m);
            assigned_set.add(m.id);
        } else if (m.days.includes(4) || m.days.includes(5)) {
            secondHalf.push(m);
            assigned_set.add(m.id);
        } else if (m.days.includes(3)) {
            midWeek.push(m);
            assigned_set.add(m.id);
        }
    });

    addLog(`前半周（周一二）：${firstHalf.length} 个大区`, '');
    addLog(`跨周中：${midWeek.length} 个大区`, '');
    addLog(`后半周（周四五）：${secondHalf.length} 个大区`, '');

    // Sort managers: those who can only take 1 inspector get priority assignment for limited inspectors
    function assignSlot(managers, slotLabel, slotDays) {
        const remaining = [...managers];

        // First pass: assign fixed-exempt inspectors (付钟庆, 王瑶) if they have capacity
        // They can check 1 region total
        const fixedExemptInspectors = INSPECTORS.filter(ins =>
            FIXED_EXEMPT.includes(ins.name) && usage[ins.id].count < ins.maxRegions
        );

        // Second pass: limited inspectors (方凯, 徐老师)
        // Third pass: full inspectors

        while (remaining.length > 0) {
            // Find the manager with fewest available inspectors (most constrained first)
            remaining.sort((a, b) => {
                const aOptions = getAvailableInspectors(a, usage, slotDays);
                const bOptions = getAvailableInspectors(b, usage, slotDays);
                return aOptions.length - bOptions.length;
            });

            const manager = remaining[0];
            const available = getAvailableInspectors(manager, usage, slotDays);

            if (available.length === 0) {
                addLog(`❌ 无法为 ${manager.name}（${manager.city}）分配检查员！时间冲突或人手不足`, 'error');
                remaining.shift();
                continue;
            }

            // Pick best: prefer nearest city, strong adjacency priority
            available.sort((a, b) => {
                const distA = getDistance(a.city, manager.city);
                const distB = getDistance(b.city, manager.city);
                // Strong distance priority: 100km threshold
                if (Math.abs(distA - distB) > 100) return distA - distB;
                // If one inspector already has an assignment, prefer the one whose
                // existing city is closer to this manager (adjacent grouping)
                if (usage[a.id].cities.length > 0 || usage[b.id].cities.length > 0) {
                    const clusterA = usage[a.id].cities.length > 0
                        ? Math.min(...usage[a.id].cities.map(c => getDistance(c, manager.city)))
                        : distA;
                    const clusterB = usage[b.id].cities.length > 0
                        ? Math.min(...usage[b.id].cities.map(c => getDistance(c, manager.city)))
                        : distB;
                    return clusterA - clusterB;
                }
                // Fallback: prefer inspector with more remaining capacity
                const capA = a.maxRegions - usage[a.id].count;
                const capB = b.maxRegions - usage[b.id].count;
                return capB - capA;
            });

            // Try each available inspector until one works (no conflict)
            let assigned = false;
            for (const candidate of available) {
                const timeConflict = candidate.type !== 'flexible' && manager.days.some(d => usage[candidate.id].days.has(d));
                const selfConflict = candidate.selfTrainingDays && manager.days.some(d => candidate.selfTrainingDays.includes(d));
                if (timeConflict || selfConflict) {
                    addLog(`${candidate.name} 与 ${manager.name} 时间冲突${selfConflict ? '（自己培训）' : ''}，尝试下一个`, 'warn');
                    continue;
                }

                // Assign
                state.assignments.push({ inspectorId: candidate.id, managerId: manager.id });
                manager.assignedInspector = candidate.id;
                manager.manualAssign = false;
                manager.days.forEach(d => usage[candidate.id].days.add(d));
                usage[candidate.id].count++;
                usage[candidate.id].cities.push(manager.city);

                const dist = Math.round(getDistance(candidate.city, manager.city));
                addLog(`✅ ${candidate.name} → ${manager.name}（${manager.city}，${slotLabel}，距离约${dist}km）`, 'success');

            assigned = true;
            remaining.shift();
            break;
            }

            if (!assigned) {
                addLog(`❌ 无法为 ${manager.name}（${manager.city}）分配检查员！所有候选人时间冲突`, 'error');
                remaining.shift();
            }
        }
    }

    // Assign each group
    assignSlot(firstHalf, '前半周', [1,2]);
    assignSlot(midWeek, '周中', [3]);
    assignSlot(secondHalf, '后半周', [4,5]);

    // Summary
    const success = state.assignments.length;
    const fail = needCheck.length - success;
    if (fail > 0) {
        showToast(`分配完成：${success} 成功，${fail} 失败`, 'error');
        addLog(`分配结果：${success} 成功，${fail} 失败。建议增加检查员或调整免检`, 'error');
    } else {
        showToast(`全部 ${success} 个大区分配成功！`, 'success');
        addLog(`🎉 全部 ${success} 个大区分配成功！`, 'success');
    }

    renderTable();
    renderInspectors();
    updateStats();
    updateInfoBanner();
    renderAssignmentDetail();
}

function getAvailableInspectors(manager, usage, slotDays) {
    return INSPECTORS.filter(ins => {
        if (usage[ins.id].count >= ins.maxRegions) return false;
        if (ins.type !== 'flexible') {
            const conflict = manager.days.some(d => usage[ins.id].days.has(d));
            if (conflict) return false;
        }
        // Check self-training conflict (付钟庆, 王瑶 cannot check during their own training)
        if (ins.selfTrainingDays && manager.days.some(d => ins.selfTrainingDays.includes(d))) return false;
        return true;
    });
}

function renderAssignmentDetail() {
    const detail = document.getElementById('assignmentDetail');
    if (state.assignments.length === 0) {
        detail.innerHTML = `<div class="no-assignment"><div class="icon">📋</div><div>点击「自动分配检查员」查看分配方案</div></div>`;
        return;
    }

    let html = '<div class="assignment-detail">';

    // Group by inspector
    INSPECTORS.forEach(ins => {
        const assignments = state.assignments.filter(a => a.inspectorId === ins.id);
        if (assignments.length === 0) return;

        const isFixedExempt = FIXED_EXEMPT.includes(ins.name);

        html += `<div class="assignment-block ${isFixedExempt ? 'free-exempt' : ''}">`;
        html += `<div class="a-title" style="color:${ins.color};">${ins.name} ${ins.type === 'flexible' ? '<span style="font-size:10px;color:#999">(灵活)</span>' : ''}</div>`;
        assignments.forEach(a => {
            const m = state.managers[a.managerId];
            const dayStr = m.days.map(d => DAY_NAMES[d-1]).join('、');
            html += `<div class="a-detail">📍 ${m.name}（${m.city}）— ${dayStr}</div>`;
        });
        html += `</div>`;
    });

    // Show unassigned
    const unassigned = state.managers.filter(m => !m.exempt && m.assignedInspector === null);
    if (unassigned.length > 0) {
        html += `<div class="assignment-block" style="border-left-color:var(--danger); background:#fff2f0;">`;
        html += `<div class="a-title" style="color:var(--danger);">⚠️ 未分配（${unassigned.length}）</div>`;
        unassigned.forEach(m => {
            const dayStr = m.days.map(d => DAY_NAMES[d-1]).join('、');
            html += `<div class="a-detail">📍 ${m.name}（${m.city}）— ${dayStr}</div>`;
        });
        html += `</div>`;
    }

    html += '</div>';
    detail.innerHTML = html;
}

    // Build data
    const headers = ['组别', '大区经理', '周一<br><span style="font-weight:400;font-size:11px;color:#999">5月11日</span>', '周二<br><span style="font-weight:400;font-size:11px;color:#999">5月12日</span>', '周三<br><span style="font-weight:400;font-size:11px;color:#999">5月13日</span>', '周四<br><span style="font-weight:400;font-size:11px;color:#999">5月14日</span>', '周五<br><span style="font-weight:400;font-size:11px;color:#999">5月15日</span>', '会议举办城市', '负责城市', '免检', '检查员'];
    const rows = [headers];

    state.managers.forEach(m => {
        const row = [
            m.group,
            m.name,
            m.days.includes(1) ? '√' : '',
            m.days.includes(2) ? '√' : '',
            m.days.includes(3) ? '√' : '',
            m.days.includes(4) ? '√' : '',
            m.days.includes(5) ? '√' : '',
            m.city,
            m.responsibleCities,
            m.exempt ? '✓ 免检' : '',
            m.exempt ? '免检' : (m.assignedInspector !== null ? INSPECTORS[m.assignedInspector].name : '')
        ];
        rows.push(row);
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);

    // Set column widths
    ws['!cols'] = [
        { wch: 6 }, { wch: 10 },
        { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 6 },
        { wch: 12 }, { wch: 50 }, { wch: 10 }, { wch: 16 }
    ];

    XLSX.utils.book_append_sheet(wb, ws, '大区培训检查排期');

    // Add inspector summary sheet
    const insHeaders = ['检查员', '可检查大区数', '已分配', '状态'];
    const insRows = [insHeaders];
    const counts = {};
    INSPECTORS.forEach(i => counts[i.id] = 0);
    state.assignments.forEach(a => counts[a.inspectorId]++);

    INSPECTORS.forEach(ins => {
        insRows.push([
            ins.name,
            ins.maxRegions,
            counts[ins.id],
            counts[ins.id] >= ins.maxRegions ? '已满' : '可分配'
        ]);
    });

    const ws2 = XLSX.utils.aoa_to_sheet(insRows);
    ws2['!cols'] = [{ wch: 12 }, { wch: 14 }, { wch: 8 }, { wch: 8 }];
    XLSX.utils.book_append_sheet(wb, ws2, '检查员分配汇总');

    const filename = `大区培训检查排期_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.xlsx`;
    XLSX.writeFile(wb, filename);

    addLog(`Excel 导出成功：${filename}`, 'success');
    showToast('Excel 导出成功！', 'success');
}

    { manager: '白高朋', inspector: '夏月' },
    { manager: '姜海艳', inspector: '方凯' },
    { manager: '李肖', inspector: '王一扬' },
    { manager: '刘海英', inspector: '侯琦' },
    { manager: '刘瑞新', inspector: '付钟庆' },
    { manager: '刘现勇', inspector: '王九洋' },
    { manager: '沈彦伟', inspector: '苑玉威' },
    { manager: '孙凤现', inspector: '王瑶' },
    { manager: '田玲', inspector: '郭士龙' },
    { manager: '王世爽', inspector: '周宁' },
    { manager: '肖敏', inspector: '周宁' },
    { manager: '杨福强', inspector: '王一扬' },
    { manager: '袁百臣', inspector: '郭士龙' },
    { manager: '张国良', inspector: '侯琦' },
];

function showDraftPlan() {
    const exemptNames = DRAFT_PLAN.map(d => d.manager);
    const allManagers = state.managers.map(m => m.name);
    const defaultExempt = allManagers.filter(n => !exemptNames.includes(n));

    let html = '<div style="max-height:60vh;overflow-y:auto;">';
    html += '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
    html += '<tr style="background:#fafafa;"><th style="padding:8px 12px;text-align:left;border-bottom:2px solid #e8e8e8;">大区经理</th><th style="padding:8px 12px;text-align:left;border-bottom:2px solid #e8e8e8;">城市</th><th style="padding:8px 12px;text-align:left;border-bottom:2px solid #e8e8e8;">检查员</th></tr>';
    DRAFT_PLAN.forEach(d => {
        const mgr = state.managers.find(m => m.name === d.manager);
        const city = mgr ? mgr.city : '-';
        html += `<tr><td style="padding:6px 12px;border-bottom:1px solid #f0f0f0;">${d.manager}</td><td style="padding:6px 12px;border-bottom:1px solid #f0f0f0;color:#666;">${city}</td><td style="padding:6px 12px;border-bottom:1px solid #f0f0f0;"><span style="color:#1677ff;font-weight:600;">${d.inspector}</span></td></tr>`;
    });
    html += '</table>';
    html += '</div>';

    showCustomModal('💡 拟定方案参考', html, '关闭', null, '✅ 应用方案', function() { applyDraftPlan(); });
}

function applyDraftPlan() {
    // 1. 先清空所有分配
    state.assignments = [];
    state.managers.forEach(m => {
        m.assignedInspector = null;
        m.manualAssign = false;
    });

    // 2. 方案中的14人：取消免检，分配检查员
    const planNames = DRAFT_PLAN.map(d => d.manager);
    state.managers.forEach(m => {
        if (planNames.includes(m.name)) {
            m.exempt = false;
        }
    });
    // 3. 不在方案中的：设为免检
    state.managers.forEach(m => {
        if (!planNames.includes(m.name)) {
            m.exempt = true;
        }
    });
    // 4. 按方案分配
    DRAFT_PLAN.forEach(d => {
        const mgr = state.managers.find(m => m.name === d.manager);
        const ins = INSPECTORS.find(i => i.name === d.inspector);
        if (mgr && ins) {
            mgr.assignedInspector = ins.id;
            mgr.manualAssign = true;
            state.assignments.push({ inspectorId: ins.id, managerId: mgr.id });
        }
    });

    renderTable();
    renderInspectors();
    renderAssignmentDetail();
    updateStats();
    updateInfoBanner();
    // 关闭弹窗
    document.querySelectorAll('.modal-overlay').forEach(el => el.remove());
}

function showCustomModal(title, content, okText, onOk, extraBtnText, extraBtnAction) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay active';
    let footerHtml = '';
    if (extraBtnText && extraBtnAction) {
        footerHtml += `<button class="btn btn-primary" style="background:#52c41a;border-color:#52c41a;" id="_modalExtraBtn">${extraBtnText}</button>`;
    }
    footerHtml += `<button class="btn btn-primary" id="_modalCloseBtn">${okText || '关闭'}</button>`;
    overlay.innerHTML = `
        <div class="modal" style="max-width:560px;">
            <div class="modal-title">${title}</div>
            <div class="modal-body" style="max-height:none;">${content}</div>
            <div class="modal-footer">
                ${footerHtml}
            </div>
        </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#_modalCloseBtn').addEventListener('click', () => { overlay.remove(); if (onOk) onOk(); });
    if (extraBtnText && extraBtnAction) {
        overlay.querySelector('#_modalExtraBtn').addEventListener('click', extraBtnAction);
    }
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

// ==================== UTILS ====================

function addLog(msg, type) {
    const log = document.getElementById('logContent');
    const now = new Date();
    const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.innerHTML = `<span class="time">${time}</span> ${msg}`;
    log.insertBefore(entry, log.firstChild);
}

function clearLog() {
    document.getElementById('logContent').innerHTML = '<div class="log-entry"><span class="time">--:--</span> 日志已清空</div>';
}

function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => { toast.className = 'toast'; }, 3000);
}
